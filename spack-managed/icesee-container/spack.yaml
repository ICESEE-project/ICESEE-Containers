spack:
  view: false

  concretizer:
    unify: when_possible

  config:
    install_tree:
      root: /opt/spack

  specs:
    - python@3.11
    - py-pip
    - py-setuptools
    - py-wheel
    - py-cython
    - py-numpy@1.26.4
    - ninja
    - pkgconf

    - openmpi@5
    - py-mpi4py ^openmpi@5
    - hdf5@1.14.5 +mpi ^openmpi@5
    - py-h5py@3.12.1 +mpi ^hdf5@1.14.5 +mpi ^openmpi@5

  repos:
    - /opt/icesee-spack